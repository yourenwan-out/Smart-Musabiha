name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build web app
        run: npm run build
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Generate Android Assets
        run: |
          # Install ImageMagick to ensure 'convert' is available
          sudo apt-get update && sudo apt-get install -y imagemagick
          
          # Remove default Android vector icons that override generated PNGs
          rm -f android/app/src/main/res/drawable/ic_launcher_background.xml
          rm -f android/app/src/main/res/drawable-v24/ic_launcher_foreground.xml
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          
          # Ensure foreground exists
          if [ ! -f assets/icon-foreground.png ]; then
            cp assets/icon-only.png assets/icon-foreground.png || true
          fi
          
          # Ensure a solid white background exists for the adaptive icon
          convert -size 1024x1024 xc:white assets/icon-background.png
          
          # Generate icons
          npx @capacitor/assets generate --android

      - name: Sync Android
        run: npx cap sync android

      - name: Regenerate Gradle Wrapper
        run: |
          cd android
          rm -f gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.13
          chmod +x gradlew

      - name: Clean Android Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --info
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
